<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Notifications - RevHire</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand"><a th:href="@{/}">RevHire</a></div>
            <div class="nav-links">
                <a th:href="@{/dashboard}" class="nav-link">Dashboard</a>
                <a th:href="@{/employer/jobs}" class="nav-link">My Jobs</a>
                <a th:href="@{/employer/jobs/new}" class="nav-link">Post Job</a>
                <a th:href="@{/employer/profile}" class="nav-link">Profile</a>
                <a th:href="@{/employer/notifications}" class="nav-link">Notifications</a>
                <a th:href="@{/logout}" class="btn btn-outline">Logout</a>
            </div>
        </div>
    </nav>
    <div class="page-container">
        <h1 class="page-title">Notifications</h1>
        <div th:if="${notifications.isEmpty()}" class="empty-state">
            <p>No notifications yet.</p>
        </div>
        <div class="notification-list">
            <div th:each="n : ${notifications}" class="notification-item" th:classappend="${!n.isRead ? 'unread' : ''}"
                style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div style="flex-grow: 1;">
                    <p class="notification-message" th:text="${n.message}">Message</p>
                    <span class="notification-time"
                        th:text="${#temporals.format(n.createdAt, 'dd MMM yyyy HH:mm')}">Time</span>
                </div>
                <div th:if="${!n.isRead}" style="margin-left: 1rem;">
                    <form th:action="@{/employer/notifications/{id}/read(id=${n.id})}" method="post">
                        <button type="submit" class="btn btn-outline btn-sm">Mark Read</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
