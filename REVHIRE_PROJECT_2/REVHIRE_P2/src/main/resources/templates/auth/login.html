<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Login - RevHire</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a th:href="@{/}" class="brand-link"> RevHire</a>
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
            </div>


            <div th:if="${param.error != null or error != null}" class="alert alert-error"
                th:text="${error != null ? error : 'Invalid email or password.'}">
            </div>


            <div th:if="${param.registered != null or success != null}" class="alert alert-success"
                th:text="${success != null ? success : 'Registration successful! Please login.'}">
            </div>

            <div th:if="${param.logout != null}" class="alert alert-success">You have been logged out.</div>



            <form th:action="@{/login}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="username">Email Address</label>
                    <input type="email" id="username" name="username" class="form-control" placeholder="you@example.com"
                        required />
                </div>
                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label for="password" style="margin-bottom: 0;">Password</label>
                    </div>
                    <input type="password" id="password" name="password" class="form-control"
                        placeholder="Your password" required />
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <p class="auth-footer">Don't have an account? <a th:href="@{/register}">Register</a></p>
        </div>
    </div>
</body>

</html>
